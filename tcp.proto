syntax = "proto3";

package launcher.tcp;

option php_namespace = "Launcher\\Tcp";
option php_metadata_namespace = "Launcher\\Tcp\\Metadata";

// ============================================================
// Request
// ============================================================

message SystemInfo {
  string family = 1; // "windows" | "macos"
  string type = 2; // "client" | "server"  (optional, default "client")
  string architecture = 3; // "x64" | "x86" | "arm64" | "arm"
  string version = 4;
  string build = 5;
  string locale = 6; // e.g. "en-US"
}

message ClientInfo {
  string id = 1; // 32-char identifier
  string architecture = 2; // "x86_64" | "i686" | "aarch64" | "arm"
  string version = 3; // x.x.x
  string locale = 4; // xx-XX
}

message WebviewInfo {
  string version = 1;
}

message LauncherRequest {
  SystemInfo system = 1;
  ClientInfo client = 2;
  WebviewInfo webview = 3;
}

// ============================================================
// Response
// ============================================================

message ClientLocation {
  string iso_code = 1;
  string country = 2;
  string city = 3;
  double lat = 4;
  double lon = 5;
}

message Region {
  uint32 id = 1;
  string title = 2;
  string code = 3;
}

message Reference {
  string component = 1;
  string type = 2;
  string url = 3;
}

message Project {
  uint32 id = 1;
  uint32 region_id = 2;
  string title = 3;
  string realmlist = 4;
  string proxy_authorization_address = 5;
  string code = 6;
  int32 priority = 7;
  repeated Reference references = 8;
}

message Torrent {
  string title = 1;
  string hash = 2;
  uint64 size = 3;
  repeated string languages = 4;
  repeated string exceptions = 5;
  int32 priority = 6;
}

message Language {
  string title = 1;
  string code = 2;
  string flag = 3;
  int32 priority = 4;
  bool is_default = 5;
}

message GameOption {
  string key = 1;
  string value = 2;
}

message Proxy {
  uint32 id = 1;
  string name = 2;
  string address = 3;
  uint32 port = 4;
  string country = 5;
  string city = 6;
  double lat = 7;
  double lon = 8;
}

message Realm {
  uint32 id = 1;
  string name = 2;
  string address = 3;
  uint32 port = 4;
  bool status = 5;
  uint32 online = 6;
  int64 diff = 7;
  int64 uptime = 8;
  string country = 9;
  string city = 10;
  double lat = 11;
  double lon = 12;
  repeated Proxy proxies = 13;
}

message Game {
  uint32 id = 1;
  uint32 project_id = 2;
  string title = 3;
  string code = 4;
  int32 expansion = 5;
  string launch_file = 6;
  string config_file = 7;
  string version_build = 8;
  int32 priority = 9;
  repeated Torrent torrents = 10;
  repeated Language languages = 11;
  repeated GameOption options = 12;
  repeated Realm realms = 13;
}

message Settings {
  string address = 1;
  uint32 port = 2;
  string country = 3;
  string city = 4;
  double lat = 5;
  double lon = 6;
}

message Tracker {
  string address = 1;
}

message Peer {
  string host = 1;
  uint32 port = 2;
  uint32 ip_version = 3; // 4 | 6
}

message Seed {
  string address = 1;
  uint32 ip_version = 2; // 4 | 6
}

message LauncherResponse {
  ClientLocation client = 1;
  repeated Region regions = 2;
  repeated Project projects = 3;
  repeated Game games = 4;
  Settings settings = 5;
  repeated Tracker trackers = 6;
  repeated Peer peers = 7;
  repeated Seed seeds = 8;
}

// ============================================================
// Error
// ============================================================

message LauncherError {
  string message = 1;
}

// ============================================================
// Heartbeat
// ============================================================

message Ping {
  int64 timestamp = 1; // unix seconds
}

message Pong {
  int64 timestamp = 1; // unix seconds (эхо из Ping, либо время клиента)
}

// ============================================================
// Envelope — единое верхнеуровневое сообщение протокола.
// Все фреймы (в обе стороны) — это Envelope с одним из полей oneof.
// ============================================================

message Envelope {
  oneof payload {
    LauncherRequest request  = 1;
    LauncherResponse response = 2;
    Ping ping  = 3;
    Pong pong = 4;
    LauncherError error = 5;
  }
}
